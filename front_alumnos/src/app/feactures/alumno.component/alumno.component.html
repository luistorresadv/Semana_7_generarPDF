<div class="table-responsive p-3">
<button routerLink="/nuevoAlumnos" class="btn btn-outline-primary mb-3">
    ➕ Nuevo Alumno
  </button>
  <button (click)="imprimirPDF()" class="btn btn-outline-primary mb-3">
    ➕ PDF
  </button>
  <table class="table table-custom align-middle" custom-table mb-0 id="tabla_alumnos">
   
    <thead>
      <tr>
        <th scope="col">Cédula</th>
        <th scope="col">Nombre</th>
        <th scope="col">Apellido</th>
        <th scope="col">Correo Electrónico</th>
        <th scope="col">Carrera</th>
        <th scope="col" class="text-center">Nivel</th>
      </tr>
    </thead>
    <tbody>
      @for (alumno of listaAlumnos; track alumno.id) {
        <tr>
          <td class="fw-bold text-secondary">{{ alumno.cedula }}</td>
          <td>{{ alumno.nombre }}</td>
          <td>{{ alumno.apellido }}</td>
          <td><span class="text-primary">{{ alumno.correo }}</span></td>
          <td><span class="badge bg-success bg-opacity-10 text-success">{{ alumno.carrera }}</span></td>
          <td class="text-center fw-semibold text-dark">{{ alumno.nivel }}</td>
        </tr>
      } @empty {
        <tr>
          <td colspan="6" class="text-center text-muted py-4">
            No hay alumnos registrados en el sistema.
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
